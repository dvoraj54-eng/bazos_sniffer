name: Daily bazos scan

on:
  schedule:
    # 06:00 UTC = 08:00 Prague time in winter (CET), 07:00 in summer (CEST)
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scanner
        run: python scraper.py

      - name: Commit results
        run: |
          git config user.name "bazos-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/index.html data/seen.json
          git diff --quiet --cached || git commit -m "Daily scan $(date -u +%F)"
          git push
